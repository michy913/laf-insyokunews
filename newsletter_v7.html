<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>飲食・人事 デイリーニュースレター</title>
<style>
:root{
  color-scheme:light;
  --or:#FF7A00;--orl:#FFF3E8;--orm:#FFD4A0;--ord:#CC5500;--ordd:#8B3A00;
  --tx:#1A1A1A;--txm:#555;--txl:#888;--bg:#F2F2F7;--wh:#FFF;--bd:#E0E0E0;
  --blue:#2563EB;--bluel:#EFF6FF;--green:#16A34A;--greenl:#F0FDF4;
  --red:#DC2626;--redl:#FEF2F2;--purple:#7C3AED;--purplel:#F5F3FF;
  --navy:#1E1B4B;--teal:#0D9488;--teall:#F0FDFA;
  --ice:#0EA5E9;--icel:#F0F9FF;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif;background:var(--bg);color:var(--tx);line-height:1.65;font-size:21px}
.app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sb{width:220px;background:var(--ordd);color:#fff;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sb-brand{padding:18px 14px 13px;background:rgba(0,0,0,.2)}
.sb-logo{font-size:19px;font-weight:900;letter-spacing:.5px}
.sb-sub{font-size:13px;opacity:.7;margin-top:3px}
.sb-search{padding:9px 10px;background:rgba(0,0,0,.15)}
.sb-search-box{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.15);border-radius:8px;padding:7px 11px}
.sb-search-icon{font-size:14px;opacity:.7;flex-shrink:0}
.sb-search-input{background:none;border:none;outline:none;color:#fff;font-size:14px;width:100%;font-family:inherit}
.sb-search-input::placeholder{color:rgba(255,255,255,.5)}
.sb-search-clear{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:16px;padding:0;flex-shrink:0;display:none}
.sb-list{flex:1;overflow-y:auto;padding:5px 0}
.sb-item{padding:10px 13px;cursor:pointer;border-left:3px solid transparent;font-size:13px;transition:background .1s}
.sb-item:hover{background:rgba(255,255,255,.1)}
.sb-item.on{background:rgba(255,255,255,.18);border-left-color:#FFD4A0}
.sb-item.sh{border-left-color:#FFD4A0;background:rgba(255,255,255,.1)}
.sb-idate{font-weight:bold;font-size:13px}
.sb-inum{font-size:11px;opacity:.6;margin-top:1px}
.sb-match{font-size:11px;opacity:.55;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-none{padding:14px;font-size:13px;opacity:.55;text-align:center}
.sb-foot{padding:9px 10px 13px;display:flex;flex-direction:column;gap:6px}
.sb-btn{width:100%;padding:9px;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;transition:background .1s}
.sb-gen{background:#fff;color:var(--ord)}
.sb-gen:hover{background:var(--orl)}
.sb-re{background:rgba(255,255,255,.15);color:#fff;font-size:12px}
.sb-re:hover{background:rgba(255,255,255,.25)}

/* ── Main wrapper ── */
.mn-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mn{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding-bottom:80px}

/* Hero header */
.hero{background:linear-gradient(135deg,#FF7A00 0%,#E84000 60%,#C23000 100%);color:#fff;padding:26px 32px 22px;position:relative;overflow:hidden;flex-shrink:0}
.hero::before{content:'';position:absolute;right:-60px;top:-60px;width:240px;height:240px;background:rgba(255,255,255,.06);border-radius:50%}
.hero::after{content:'';position:absolute;right:80px;bottom:-40px;width:130px;height:130px;background:rgba(255,255,255,.04);border-radius:50%}
.hero-eyebrow{font-size:13px;font-weight:bold;letter-spacing:3px;opacity:.8;text-transform:uppercase;margin-bottom:7px}
.hero-title{font-size:32px;font-weight:900;line-height:1.1;margin-bottom:7px}
.hero-date{font-size:18px;opacity:.85}

/* Content */
.content{padding:22px 26px 36px;flex:1}
.sec-label{display:flex;align-items:center;gap:11px;margin-bottom:16px}
.sec-badge{color:#fff;font-size:13px;font-weight:900;padding:4px 12px;border-radius:20px;letter-spacing:.5px}
.sec-title{font-size:21px;font-weight:bold;color:var(--tx)}
.divider{height:1px;background:var(--bd);margin:6px 0 22px}

/* ── News cards ── */
.news-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:30px}
.nc{background:var(--wh);border-radius:13px;overflow:hidden;box-shadow:0 1px 7px rgba(0,0,0,.07);display:flex}
.nc-accent{width:6px;flex-shrink:0}
.nc-accent-large{background:var(--or)}
.nc-accent-small{background:#10B981}
.nc-accent-client{background:#F59E0B}
.nc-body{padding:16px 18px;flex:1}
.nc-top{display:flex;align-items:center;gap:9px;margin-bottom:8px;flex-wrap:wrap}
.nc-tag{font-size:12px;font-weight:bold;padding:3px 10px;border-radius:10px;white-space:nowrap}
.tag-ma{background:#FEE2E2;color:#991B1B}
.tag-open{background:#D1FAE5;color:#065F46}
.tag-close{background:#FEF3C7;color:#92400E}
.tag-hr{background:#EDE9FE;color:#5B21B6}
.tag-trend{background:#DBEAFE;color:#1E40AF}
.nc-scale{font-size:11px;font-weight:bold;padding:2px 8px;border-radius:6px;white-space:nowrap}
.scale-large{background:#FFF3E8;color:#CC5500}
.scale-small{background:#ECFDF5;color:#065F46}
.scale-client{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.nc-headline{font-size:19px;font-weight:bold;color:var(--tx);line-height:1.35;margin-bottom:7px}
.nc-body-text{font-size:17px;color:var(--txm);line-height:1.65}

/* ── Labor visual (Section 2) ── */
.labor-card{background:var(--wh);border-radius:16px;overflow:hidden;box-shadow:0 2px 14px rgba(0,0,0,.08);margin-bottom:30px}
.lc-hero{background:linear-gradient(135deg,#1E1B4B 0%,#312E81 50%,#4C1D95 100%);color:#fff;padding:24px 26px;position:relative;overflow:hidden}
.lc-hero::after{content:'';position:absolute;right:-30px;top:-30px;width:150px;height:150px;background:rgba(255,255,255,.05);border-radius:50%}
.lc-tag{font-size:13px;font-weight:bold;letter-spacing:2px;opacity:.7;text-transform:uppercase;margin-bottom:9px}
.lc-emoji{font-size:40px;margin-bottom:9px;display:block}
.lc-title{font-size:27px;font-weight:900;line-height:1.2;margin-bottom:9px}
.lc-simple{background:rgba(255,255,255,.12);border-radius:9px;padding:11px 15px;font-size:17px;line-height:1.55}
.lc-simple strong{color:#FDE68A}
.kn-strip{display:flex;gap:0;border-bottom:1px solid var(--bd)}
.kn-item{flex:1;padding:18px 14px;text-align:center;border-right:1px solid var(--bd)}
.kn-item:last-child{border-right:none}
.kn-num{font-size:32px;font-weight:900;color:var(--or);line-height:1}
.kn-label{font-size:13px;color:var(--txm);margin-top:5px;line-height:1.3}
.lc-diagram{padding:22px 24px}
.steps{display:flex;flex-direction:column;gap:0}
.step{display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px dashed var(--bd)}
.step:last-child{border-bottom:none}
.step-num{width:36px;height:36px;border-radius:50%;background:var(--or);color:#fff;font-size:17px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{font-size:18px;font-weight:bold;color:var(--tx);margin-bottom:4px}
.step-desc{font-size:16px;color:var(--txm);line-height:1.6}
.comp{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}
.comp-box{border-radius:11px;padding:16px;text-align:center}
.comp-bad{background:var(--redl);border:2px solid #FCA5A5}
.comp-good{background:var(--greenl);border:2px solid #86EFAC}
.comp-arrow{font-size:26px;color:var(--txm)}
.comp-label{font-size:13px;font-weight:bold;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
.comp-bad .comp-label{color:var(--red)}
.comp-good .comp-label{color:var(--green)}
.comp-val{font-size:22px;font-weight:900;margin-bottom:5px}
.comp-bad .comp-val{color:var(--red)}
.comp-good .comp-val{color:var(--green)}
.comp-desc{font-size:14px;color:var(--txm);line-height:1.4}
.qa-list{display:flex;flex-direction:column;gap:11px}
.qa-item{border-radius:11px;overflow:hidden}
.qa-q{background:var(--bluel);padding:12px 16px;font-size:16px;font-weight:bold;color:var(--blue);display:flex;gap:9px}
.qa-a{background:#F8FAFF;padding:12px 16px;font-size:15px;color:var(--txm);line-height:1.6;display:flex;gap:9px}
.num-cards{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.num-card{border-radius:11px;padding:16px;text-align:center}
.num-card:nth-child(1){background:var(--bluel);border:2px solid #BFDBFE}
.num-card:nth-child(2){background:var(--greenl);border:2px solid #BBF7D0}
.num-card:nth-child(3){background:var(--purplel);border:2px solid #DDD6FE}
.num-card:nth-child(4){background:#FFF7ED;border:2px solid var(--orm)}
.num-card-num{font-size:30px;font-weight:900;margin-bottom:5px}
.num-card:nth-child(1) .num-card-num{color:var(--blue)}
.num-card:nth-child(2) .num-card-num{color:var(--green)}
.num-card:nth-child(3) .num-card-num{color:var(--purple)}
.num-card:nth-child(4) .num-card-num{color:var(--or)}
.num-card-label{font-size:13px;color:var(--txm);line-height:1.3}
/* ── Source links ── */
.nc-source{font-size:13px;color:var(--txl);margin-top:8px;border-top:1px dashed var(--bd);padding-top:7px}
.nc-source a{color:var(--blue);text-decoration:none}
.nc-source a:hover{text-decoration:underline}
.lc-source-row{font-size:13px;color:rgba(255,255,255,.65);margin-top:10px;border-top:1px solid rgba(255,255,255,.15);padding-top:8px}
.lc-source-row a{color:rgba(255,255,255,.85);text-decoration:none}
.lc-source-row a:hover{text-decoration:underline}
/* ── Section 4: Client News ── */
.no-info-msg{background:#F9FAFB;border:1.5px dashed #D1D5DB;border-radius:10px;padding:18px 22px;color:#9CA3AF;font-size:15px;text-align:center;margin-bottom:16px}
.client-news-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:30px}
.cc-item{background:var(--wh);border-radius:13px;overflow:hidden;box-shadow:0 1px 7px rgba(0,0,0,.07);display:flex}
.cc-accent{width:6px;background:#F59E0B;flex-shrink:0}
.cc-body-wrap{padding:16px 18px;flex:1}
.cc-company-badge{font-size:12px;font-weight:bold;color:#92400E;background:#FFFBEB;display:inline-block;padding:2px 9px;border-radius:6px;margin-bottom:7px;border:1px solid #FDE68A}
.cc-headline{font-size:19px;font-weight:bold;color:var(--tx);line-height:1.35;margin-bottom:7px}
.cc-body-text{font-size:17px;color:var(--txm);line-height:1.65}
.example-box{margin:18px 0 0;background:#FFFBEB;border:2px solid #FDE68A;border-radius:11px;padding:14px 16px}
.example-label{font-size:13px;font-weight:bold;color:#92400E;letter-spacing:1px;margin-bottom:6px}
.example-text{font-size:16px;color:var(--tx);line-height:1.6}
.points-wrap{border-top:1px solid var(--bd);padding:18px 24px}
.points-title{font-size:14px;font-weight:bold;color:var(--txm);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.point-row{display:flex;gap:11px;margin-bottom:12px;align-items:flex-start}
.point-row:last-child{margin-bottom:0}
.point-dot{width:25px;height:25px;min-width:25px;background:var(--or);border-radius:50%;color:#fff;font-size:13px;font-weight:bold;display:flex;align-items:center;justify-content:center;margin-top:3px}
.point-text{font-size:17px;color:var(--tx);line-height:1.65}

/* ── Section 3: アイスブレイク ── */
.icebreaker-card{background:var(--wh);border-radius:16px;overflow:hidden;box-shadow:0 2px 14px rgba(0,0,0,.08);margin-bottom:20px}
.ib-hero{background:linear-gradient(135deg,#0369A1 0%,#0EA5E9 60%,#38BDF8 100%);color:#fff;padding:20px 24px;position:relative;overflow:hidden}
.ib-hero::after{content:'';position:absolute;right:-30px;top:-30px;width:140px;height:140px;background:rgba(255,255,255,.07);border-radius:50%}
.ib-tag{font-size:13px;font-weight:bold;letter-spacing:2px;opacity:.75;text-transform:uppercase;margin-bottom:7px}
.ib-title{font-size:22px;font-weight:900;line-height:1.2;margin-bottom:5px}
.ib-sub{font-size:15px;opacity:.85;line-height:1.5}
.ib-items{padding:18px 22px;display:flex;flex-direction:column;gap:14px}
.ib-item{background:var(--icel);border:2px solid #BAE6FD;border-radius:12px;padding:16px 18px}
.ib-item-num{font-size:12px;font-weight:bold;color:var(--ice);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}
.ib-news-ref{font-size:15px;font-weight:bold;color:var(--tx);margin-bottom:8px;padding-bottom:7px;border-bottom:1px dashed #BAE6FD}
.ib-opening{font-size:17px;color:var(--tx);line-height:1.65;margin-bottom:6px}
.ib-opening-label{font-size:12px;font-weight:bold;color:var(--ice);margin-bottom:4px}
.ib-point{font-size:15px;color:var(--txm);line-height:1.6;background:#F7FCFF;border-radius:7px;padding:9px 12px;margin-top:7px}
.ib-point-label{font-size:12px;font-weight:bold;color:var(--txm);margin-bottom:3px}

/* ── Section 3: 労務提案ストーリー ── */
.proposal-card{background:var(--wh);border-radius:16px;overflow:hidden;box-shadow:0 2px 14px rgba(0,0,0,.08);margin-bottom:30px}
.pc-hero{background:linear-gradient(135deg,#0F172A 0%,#1E3A5F 55%,#0D4F7C 100%);color:#fff;padding:22px 26px;position:relative;overflow:hidden}
.pc-hero::after{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;background:rgba(255,255,255,.04);border-radius:50%}
.pc-tag{font-size:13px;font-weight:bold;letter-spacing:2px;opacity:.65;text-transform:uppercase;margin-bottom:8px}
.pc-logo{font-size:13px;font-weight:900;background:rgba(255,255,255,.15);display:inline-block;padding:3px 10px;border-radius:5px;margin-bottom:10px;letter-spacing:1px}
.pc-title{font-size:23px;font-weight:900;line-height:1.2;margin-bottom:10px}
.pc-hook{background:rgba(255,200,0,.15);border-left:3px solid #FCD34D;border-radius:0 8px 8px 0;padding:11px 15px;font-size:17px;line-height:1.55;color:#FFF9E6}
.pc-body{padding:22px 24px;display:flex;flex-direction:column;gap:18px}
.pc-section-title{font-size:14px;font-weight:bold;color:var(--txm);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.story-box{background:linear-gradient(135deg,#F0F9FF,#E0F2FE);border:2px solid #BAE6FD;border-radius:12px;padding:18px}
.story-text{font-size:17px;color:var(--tx);line-height:1.75}
.closing-box{background:#FFFBEB;border:2px solid #FDE68A;border-radius:10px;padding:14px 16px}
.closing-label{font-size:13px;font-weight:bold;color:#92400E;letter-spacing:1px;margin-bottom:7px}
.closing-q{font-size:19px;font-weight:bold;color:var(--tx);line-height:1.4}

/* ── Section 3 wrap ── */
.sec3-wrap{display:flex;flex-direction:column;gap:0}

/* ── Bottom Q&A bar ── */
.bottom-bar{flex-shrink:0;background:var(--wh);border-top:2px solid var(--bd);padding:12px 16px;display:flex;flex-direction:column;gap:0}
.bottom-bar-inner{display:flex;gap:10px;align-items:center}
.bottom-bar-label{font-size:13px;font-weight:bold;color:var(--or);margin-bottom:7px}
.bottom-input{flex:1;padding:12px 16px;border:2px solid var(--bd);border-radius:12px;font-size:17px;font-family:inherit;outline:none;color:var(--tx);transition:border .15s}
.bottom-input:focus{border-color:var(--or)}
.bottom-send{background:var(--or);color:#fff;border:none;padding:12px 20px;border-radius:12px;font-size:17px;font-weight:bold;cursor:pointer;transition:background .1s;white-space:nowrap;flex-shrink:0}
.bottom-send:hover{background:var(--ord)}
.bottom-send:disabled{background:#ccc;cursor:not-allowed}
.qa-response{background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border:2px solid #86EFAC;border-radius:12px;padding:16px 18px;margin-top:10px;font-size:17px;color:var(--tx);line-height:1.7;animation:fadeIn .3s ease}
.qa-response-label{font-size:13px;font-weight:bold;color:var(--green);margin-bottom:8px}
.qa-response-close{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--txm);margin-left:8px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Search */
.sr-wrap{flex:1;padding:22px 26px 32px}
.sr-header{margin-bottom:18px}
.sr-title{font-size:23px;font-weight:bold;color:var(--ord)}
.sr-count{font-size:16px;color:var(--txm);margin-top:4px}
.sr-card{background:var(--wh);border-radius:13px;margin-bottom:13px;overflow:hidden;box-shadow:0 1px 7px rgba(0,0,0,.07);cursor:pointer;transition:box-shadow .15s}
.sr-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.12)}
.sr-card-head{background:var(--or);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.sr-card-date{color:#fff;font-size:16px;font-weight:bold}
.sr-card-num{color:rgba(255,255,255,.75);font-size:13px}
.sr-matches{padding:14px 16px;display:flex;flex-direction:column;gap:7px}
.sr-match-item{font-size:16px;color:var(--tx);line-height:1.5;padding:8px 12px;background:var(--bg);border-radius:7px;border-left:3px solid var(--or)}
.sr-match-label{font-size:12px;font-weight:bold;color:var(--or);margin-bottom:3px}
mark{background:#FFE58A;color:var(--tx);border-radius:2px;padding:0 2px}

/* States */
.s-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 32px;text-align:center}
.s-icon{font-size:60px;margin-bottom:15px}
.s-title{font-size:28px;font-weight:900;color:var(--ord);margin-bottom:11px}
.s-desc{font-size:18px;color:var(--txm);margin-bottom:26px;max-width:360px;line-height:1.65}
.s-btn{background:var(--or);color:#fff;border:none;padding:15px 34px;border-radius:13px;font-size:20px;font-weight:bold;cursor:pointer;box-shadow:0 4px 14px rgba(255,122,0,.35);transition:transform .1s,box-shadow .1s}
.s-btn:hover{transform:translateY(-2px);box-shadow:0 7px 20px rgba(255,122,0,.45)}
.s-load{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;text-align:center}
.spin{width:56px;height:56px;border:5px solid var(--orl);border-top-color:var(--or);border-radius:50%;animation:spin .75s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-msg{font-size:21px;color:var(--txm)}
.spin-step{font-size:17px;color:var(--or);margin-top:9px}
.footer{padding:16px 26px;border-top:1px solid var(--bd);font-size:14px;color:var(--txl);text-align:center}
</style>
</head>
<body>
<div class="app">

<!-- Sidebar -->
<div class="sb">
  <div class="sb-brand">
    <div class="sb-logo">📰 Daily HR</div>
    <div class="sb-sub">飲食・人事ニュースレター</div>
  </div>
  <div class="sb-search">
    <div class="sb-search-box">
      <span class="sb-search-icon">🔍</span>
      <input class="sb-search-input" id="searchInput" type="text" placeholder="キーワード検索..." oninput="onSearch(this.value)" autocomplete="off">
      <button class="sb-search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
  </div>
  <div class="sb-list" id="sbList"><div class="sb-none">まだ号がありません</div></div>
  <div class="sb-foot">
    <button class="sb-btn sb-gen" onclick="generateToday()">＋ 今日の号を生成</button>
    <button class="sb-btn sb-re" onclick="regenToday()">🔄 今日の号を再生成</button>
  </div>
</div>

<!-- Main + Bottom bar -->
<div class="mn-wrap">
  <div class="mn" id="mn">
    <div class="s-empty">
      <div class="s-icon">🍜</div>
      <div class="s-title">今日のニュースレター</div>
      <div class="s-desc">飲食業界の人事トレンド・労務トピックス・ラフテルズ商談アプローチを毎日まとめます。</div>
      <button class="s-btn" onclick="generateToday()">🔍 今日の号を生成する</button>
    </div>
  </div>

  <!-- Bottom Q&A bar -->
  <div class="bottom-bar">
    <div class="bottom-bar-label">💬 このニュースレターについて深掘り質問</div>
    <div class="bottom-bar-inner">

function toStr(v){
  if(typeof v==='string') return v;
  if(!v) return '';
  if(Array.isArray(v)){const t=v.find(b=>b&&b.type==='text');return t?String(t.text||''):v.map(b=>b?.text||'').join('');}
  if(typeof v==='object'){
    if(typeof v.text==='string') return v.text;
    if(typeof v.content==='string') return v.content;
    if(typeof v.response==='string') return v.response;
    if(Array.isArray(v.content)){const t=v.content.find(b=>b&&b.type==='text');if(t)return String(t.text||'');}
    return JSON.stringify(v);
  }
  return String(v);
}
function parseJSON(raw){
  const text=toStr(raw);if(!text)return null;
  try{return JSON.parse(text.trim());}catch(e){}
  const mb=text.match(/```(?:json)?\s*([\s\S]*?)```/);if(mb){try{return JSON.parse(mb[1].trim());}catch(e){}}
  const as=text.indexOf('['),ae=text.lastIndexOf(']');if(as>=0&&ae>as){try{return JSON.parse(text.slice(as,ae+1));}catch(e){}}
  const os=text.indexOf('{'),oe=text.lastIndexOf('}');if(os>=0&&oe>os){try{return JSON.parse(text.slice(os,oe+1));}catch(e){}}
  return null;
}

async function sendQA(){

  if(!q)return;

  try{
    const ctx=issue?`
【今日のニュースレター（${jpDate(issue.date)}）の内容】
飲食ニュース：${(issue.newsItems||[]).map(n=>`[${n.scale||'大手'}]${n.headline} - ${n.body}`).join(' / ')}
労務トピック：${issue.topic?.title||''} - ${(issue.topic?.points||[]).join(' / ')}
提案ストーリー：${issue.laborProposal?.story||''}
`:'【ニュースレターは未生成です】';
    const prompt=`あなたはラフテルズという飲食業界専門の人事コンサルタントです。
${ctx}

ユーザーの質問：「${q}」

上記のニュースレター内容を踏まえて、飲食業の経営者・人事担当者にとって実践的で分かりやすい回答を日本語で200〜300字でまとめてください。`;

    const ans=toStr(raw);

    input.value='';
  }catch(e){
    resp.innerHTML=`<div class="qa-response"><div class="qa-response-label">⚠️ エラー</div>${esc(String(e?.message||e))}</div>`;
  }
  btn.disabled=false;btn.textContent='送信';
}

/* ── Search ── */
function highlight(text,q){
  if(!q||!text)return esc(text||'');
  const escaped=esc(text);
  const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return escaped.replace(re,m=>`<mark>${m}</mark>`);
}
function issueMatch(issue,q){
  if(!q)return true;const ql=q.toLowerCase();
  return[
    issue.date,
    ...(issue.newsItems||[]).map(n=>`${n.tag} ${n.headline} ${n.body} ${n.scale||''}`),
    issue.topic?.title||'',issue.topic?.simpleExplain||'',
    ...(issue.topic?.points||[]),issue.topic?.example||'',
    ...(issue.icebreakers||[]).map(ib=>`${ib.newsRef||''} ${ib.opening||ib.hook||''} ${ib.point||ib.talkingPoint||''}`),
    issue.laborProposal?.hook||'',issue.laborProposal?.story||''
  ].some(t=>(t||'').toLowerCase().includes(ql));
}
function getSnippets(issue,q){
  if(!q)return[];const ql=q.toLowerCase();const s=[];
  (issue.newsItems||[]).forEach(n=>{if((`${n.headline} ${n.body}`).toLowerCase().includes(ql))s.push({label:'飲食ニュース',text:n.headline});});
  const tp=issue.topic||{};
  if((tp.title||'').toLowerCase().includes(ql))s.push({label:'労務トピック',text:tp.title});
  (tp.points||[]).forEach(p=>{if((p||'').toLowerCase().includes(ql))s.push({label:'まとめポイント',text:p});});
  (issue.icebreakers||[]).forEach(ib=>{if((`${ib.newsRef||''} ${ib.opening||''}`).toLowerCase().includes(ql))s.push({label:'アイスブレイク',text:(ib.newsRef||'').slice(0,30)});});
  const pr=issue.laborProposal||{};
  if((pr.hook||'').toLowerCase().includes(ql))s.push({label:'提案フック',text:pr.hook});
  if((pr.story||'').toLowerCase().includes(ql))s.push({label:'提案ストーリー',text:(pr.story||'').slice(0,60)+'…'});
  return s.slice(0,3);
}
function renderSidebar(){
  const list=load();const el=document.getElementById('sbList');
  const q=searchQuery.trim();
  const filtered=q?list.filter(iss=>issueMatch(iss,q)):list;
  if(!list.length){el.innerHTML='<div class="sb-none">まだ号がありません</div>';return;}
  if(!filtered.length){el.innerHTML=`<div class="sb-none">「${esc(q)}」の結果なし</div>`;return;}
  el.innerHTML=filtered.map(iss=>{
    const idx=list.findIndex(x=>x.date===iss.date);
    const num=list.length-idx;
    const snips=getSnippets(iss,q);
    const matchLine=snips.length?`<div class="sb-match">📍${esc(snips[0].label)}：${esc(snips[0].text.slice(0,16))}…</div>`:'';
    return`<div class="sb-item ${iss.date===activeDate?'on':q?'sh':''}" onclick="showIssueFromSearch('${iss.date}')">
      <div class="sb-idate">${jpDate(iss.date)}</div>
      <div class="sb-inum">No.${num}</div>${matchLine}
    </div>`;
  }).join('');
}

function showSearchResults(q){

      const idx=list.findIndex(x=>x.date===iss.date);
